<div class="block-content">
    <div class="giant-minicart-header">
        <strong class="giant-minicart-title" translate="'Shopping Cart'"></strong>
        <button type="button"
                id="btn-minicart-close"
                class="giant-minicart-close"
                data-bind="attr: {'aria-label': $t('Close')}"
                data-action="close">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <if args="getCartParam('summary_count')">
        <div data-action="scroll" class="minicart-items-wrapper">
            <ol id="mini-cart" class="minicart-items" data-bind="foreach: { data: getCartItems(), as: 'item' }">
                <each args="$parent.getRegion($parent.getItemRenderer(item.product_type))"
                      render="{name: getTemplate(), data: item, afterRender: function() {$parents[1].initSidebar()}}"
                ></each>
            </ol>
        </div>
    </if>

    <ifnot args="getCartParam('summary_count')">
        <div class="giant-minicart-empty">
            <div class="giant-minicart-empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#ccc" fill-rule="evenodd" clip-rule="evenodd" d="M4.23622 5.68945H2.10352V3.68945H5.97081L7.47081 14.1895H16.8352L18.3019 8.68945H8.10352L11.6035 6.68945H20.9051L18.3718 16.1895H5.73622L4.23622 5.68945Z"></path>
                    <path fill="#ccc" d="M9.60352 19.1895C9.60352 20.0179 8.93194 20.6895 8.10352 20.6895C7.27509 20.6895 6.60352 20.0179 6.60352 19.1895C6.60352 18.361 7.27509 17.6895 8.10352 17.6895C8.93194 17.6895 9.60352 18.361 9.60352 19.1895Z"></path>
                    <path fill="#ccc" d="M17.6035 19.1895C17.6035 20.0179 16.9319 20.6895 16.1035 20.6895C15.2751 20.6895 14.6035 20.0179 14.6035 19.1895C14.6035 18.361 15.2751 17.6895 16.1035 17.6895C16.9319 17.6895 17.6035 18.361 17.6035 19.1895Z"></path>
                </svg>
            </div>
            <strong class="subtitle empty"
                    translate="'You have no items in your shopping cart.'"
            ></strong>
            <button type="button"
                    id="btn-minicart-close-empty"
                    class="giant-btn-continue"
                    data-action="close">
                <span translate="'Continue Shopping.'"></span>
            </button>
        </div>
    </ifnot>

    <div class="giant-minicart-footer" if="getCartParam('summary_count')">
        <each args="getRegion('subtotalContainer')" render=""></each>
        <each args="getRegion('extraInfo')" render=""></each>

        <div class="giant-minicart-total">
            <span class="giant-minicart-total-label" translate="'Total'"></span>
            <div class="giant-minicart-total-amount">
                <span class="price" data-bind="html: getCartParam('subtotal')"></span>
                <span class="giant-minicart-tax-note" translate="'Tax included'"></span>
            </div>
        </div>

        <div class="giant-minicart-actions">
            <div class="primary" if="getCartParam('possible_onepage_checkout')">
                <button
                    id="top-cart-btn-checkout"
                    type="button"
                    class="giant-btn-checkout"
                    data-action="close"
                    data-bind="
                        attr: { title: $t('Proceed to Checkout') },
                        click: closeMinicart()
                    "
                    translate="'Proceed to Checkout'"
                ></button>
            </div>
            <div class="secondary">
                <a class="giant-link-continue" data-bind="attr: {href: shoppingCartUrl}">
                    <span translate="'Continue Shopping'"></span>
                </a>
            </div>
        </div>

        <div id="minicart-widgets" class="minicart-widgets" if="regionHasElements('promotion')">
            <each args="getRegion('promotion')" render=""></each>
        </div>
    </div>
</div>
<each args="getRegion('sign-in-popup')" render=""></each>
