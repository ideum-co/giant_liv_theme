[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/tmp/supervisord.pid
logfile_maxbytes=50MB
logfile_backups=10

[program:php-fpm]
command=/usr/local/sbin/php-fpm --nodaemonize
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:magento-cron]
command=/bin/bash -c "while true; do /usr/local/bin/php /var/www/html/bin/magento cron:run 2>&1; sleep 60; done"
autostart=true
autorestart=true
priority=15
user=www-data
stdout_logfile=/var/log/magento-cron.log
stderr_logfile=/var/log/magento-cron-error.log
