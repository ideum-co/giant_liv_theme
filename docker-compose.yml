version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: magento-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    networks:
      - magento-network

  php-fpm:
    build:
      context: ./docker/php-fpm
      dockerfile: Dockerfile
    container_name: magento-php
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - PHP_MEMORY_LIMIT=2G
    networks:
      - magento-network

  mysql:
    image: mysql:8.0
    container_name: magento-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: magento_root
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d/source
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmagento_root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - magento-network

  elasticsearch:
    image: elasticsearch:7.17.24
    container_name: magento-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - magento-network

volumes:
  mysql-data:
  elasticsearch-data:

networks:
  magento-network:
    driver: bridge
